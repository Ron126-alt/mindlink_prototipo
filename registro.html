<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MindLink - Registro</title>
<link rel="stylesheet" href="css/styles.css">
<script defer src="js/registro.js"></script>
</head>
<body>

<main class="card">
  <h2>Crear cuenta</h2>

  <label for="firstName">Nombre</label>
  <input id="firstName" type="text" placeholder="Tu nombre">

  <label for="lastName">Apellido</label>
  <input id="lastName" type="text" placeholder="Tu apellido">

  <label for="dob">Fecha de nacimiento</label>
  <input id="dob" type="date">

  <label for="email">Correo electrónico</label>
  <input id="email" type="email" placeholder="usuario@ejemplo.com">

  <label for="password">Contraseña</label>
  <input id="password" type="password" placeholder="Contraseña (mín. 6 caracteres)">

  <label for="password2">Confirmar contraseña</label>
  <input id="password2" type="password" placeholder="Repite la contraseña">

  <button id="btnRegister">Registrarse</button>

  <div id="register-msg" class="muted" style="margin-top:10px;"></div>

  <div class="muted" style="margin-top:10px;">
    ¿Ya tienes cuenta? <a href="index.html">Iniciar sesión</a>
  </div>
</main>

</body>
</html>
