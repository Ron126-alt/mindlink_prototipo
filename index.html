<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MindLink - Inicio</title>
<link rel="stylesheet" href="css/styles.css">
<script defer src="js/login.js"></script>
</head>
<body>

<main class="card">
  <h2>Iniciar sesión</h2>

  <label for="login-email">Correo electrónico</label>
  <input id="login-email" type="email" placeholder="usuario@ejemplo.com">

  <label for="login-password">Contraseña</label>
  <input id="login-password" type="password" placeholder="Contraseña">

  <button id="btnLogin">Ingresar</button>

  <div class="muted" style="margin-top:10px;">
    ¿No tienes cuenta? <a href="registro.html">Crear cuenta</a>
  </div>

  <div id="login-msg" class="muted" style="margin-top:8px;"></div>
</main>

</body>
</html>
